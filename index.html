<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>⚡ Simple Converter</title>
    
    <!-- Simple icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-content">
            <i class="fas fa-exchange-alt"></i>
            <h1>Simple Converter</h1>
            <button class="theme-btn" id="themeToggle">🌙</button>
        </div>
        <div class="status-bar" id="statusBar">
            <span id="statusText">✅ Live rates</span>
            <span id="rateInfo">1500 calls left</span>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab active" data-tab="time">⏱️ Time</button>
        <button class="tab" data-tab="money">💰 Money</button>
        <button class="tab" data-tab="history">📋 History</button>
    </div>

    <!-- Time Tab -->
    <div class="tab-content active" id="timeTab">
        <div class="card">
            <div class="input-row">
                <div class="input-group">
                    <label>From</label>
                    <div class="input-box">
                        <input type="number" id="timeInput" value="1">
                        <select id="timeFrom">
                            <option value="seconds">Seconds</option>
                            <option value="minutes">Minutes</option>
                            <option value="hours" selected>Hours</option>
                            <option value="days">Days</option>
                            <option value="weeks">Weeks</option>
                            <option value="months">Months</option>
                            <option value="years">Years</option>
                        </select>
                    </div>
                </div>
                
                <button class="swap-btn" id="timeSwap">
                    <i class="fas fa-arrow-down"></i>
                </button>
                
                <div class="input-group">
                    <label>To</label>
                    <div class="input-box">
                        <input type="number" id="timeOutput" readonly>
                        <select id="timeTo">
                            <option value="seconds">Seconds</option>
                            <option value="minutes" selected>Minutes</option>
                            <option value="hours">Hours</option>
                            <option value="days">Days</option>
                            <option value="weeks">Weeks</option>
                            <option value="months">Months</option>
                            <option value="years">Years</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="quick-info">
                <div class="info-item">
                    <span class="info-label">CPU Cycles</span>
                    <span class="info-value" id="cpuCycles">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Heartbeats</span>
                    <span class="info-value" id="heartbeats">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Movies</span>
                    <span class="info-value" id="movies">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Lifespan</span>
                    <span class="info-value" id="lifespan">-</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Money Tab -->
    <div class="tab-content" id="moneyTab">
        <div class="card">
            <div class="input-row">
                <div class="input-group">
                    <label>From</label>
                    <div class="currency-box">
                        <span class="flag" id="fromFlag">🇺🇸</span>
                        <input type="number" id="moneyInput" value="100">
                        <select id="moneyFrom" class="currency-select">
                            <option value="USD">USD</option>
                            <option value="EUR">EUR</option>
                            <option value="GBP">GBP</option>
                            <option value="JPY">JPY</option>
                            <option value="CAD">CAD</option>
                            <option value="AUD">AUD</option>
                            <option value="CNY">CNY</option>
                            <option value="INR">INR</option>
                        </select>
                    </div>
                </div>
                
                <button class="swap-btn" id="moneySwap">
                    <i class="fas fa-arrow-down"></i>
                </button>
                
                <div class="input-group">
                    <label>To</label>
                    <div class="currency-box">
                        <span class="flag" id="toFlag">🇪🇺</span>
                        <input type="number" id="moneyOutput" readonly>
                        <select id="moneyTo" class="currency-select">
                            <option value="USD">USD</option>
                            <option value="EUR" selected>EUR</option>
                            <option value="GBP">GBP</option>
                            <option value="JPY">JPY</option>
                            <option value="CAD">CAD</option>
                            <option value="AUD">AUD</option>
                            <option value="CNY">CNY</option>
                            <option value="INR">INR</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="rate-box">
                <div class="rate" id="exchangeRate">1 USD = 0.85 EUR</div>
                <button class="refresh-btn" id="refreshRates">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>

            <div class="popular-list" id="popularList">
                <!-- Will be filled by JS -->
            </div>
        </div>
    </div>

    <!-- History Tab -->
    <div class="tab-content" id="historyTab">
        <div class="card">
            <div class="history-header">
                <h3>Recent Conversions</h3>
                <button class="clear-btn" id="clearHistory">
                    <i class="fas fa-trash"></i> Clear
                </button>
            </div>
            <div class="history-list" id="historyList">
                <div class="empty-state">
                    <i class="fas fa-history"></i>
                    <p>No conversions yet</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <span>⚡ v1.0 • Simple & Fast</span>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
</body>
</html>
